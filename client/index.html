<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Arena - 2P 枪战</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 主菜单 -->
  <div id="menu" class="menu">
    <div class="menu-content">
      <h1>🎯 FPS Arena</h1>
      <p class="subtitle">2 Player Local Network FPS</p>
      
      <div class="menu-section">
        <h3>加入房间</h3>
        <input type="text" id="playerName" placeholder="你的名字" maxlength="12">
        <input type="text" id="roomCode" placeholder="房间号" maxlength="8">
        <button id="joinBtn" class="btn btn-primary">加入游戏</button>
      </div>

      <div class="menu-section">
        <h3>创建房间</h3>
        <button id="createBtn" class="btn btn-secondary">创建新房间</button>
        <p class="hint">创建后分享房间号给朋友</p>
      </div>

      <div id="menuStatus" class="status"></div>
    </div>
  </div>

  <!-- 等待室 -->
  <div id="lobby" class="lobby hidden">
    <div class="lobby-content">
      <h2>房间: <span id="lobbyRoomCode"></span></h2>
      <div class="players-preview">
        <div class="player-slot" id="player1Slot">
          <div class="slot-empty">等待玩家 1...</div>
        </div>
        <div class="vs">VS</div>
        <div class="player-slot" id="player2Slot">
          <div class="slot-empty">等待玩家 2...</div>
        </div>
      </div>
      <p class="hint">等待另一位玩家加入...</p>
      <button id="leaveLobbyBtn" class="btn btn-danger">离开房间</button>
    </div>
  </div>

  <!-- 倒计时 -->
  <div id="countdown" class="countdown hidden">
    <div class="countdown-number" id="countdownNumber">3</div>
    <p>游戏即将开始!</p>
  </div>

  <!-- 游戏界面 -->
  <div id="game" class="game hidden">
    <!-- HUD -->
    <div id="hud">
      <div class="hud-top">
        <div class="hud-left">
          <div class="health-bar">
            <div id="healthFill"></div>
            <span id="healthText">100</span>
          </div>
          <div class="kill-counter">
            <span class="icon">💀</span>
            <span id="killCount">0</span>
            <span class="separator">/</span>
            <span id="killLimit">10</span>
          </div>
        </div>
        <div class="hud-center">
          <div id="crosshair" class="crosshair">
            <div class="crosshair-line top"></div>
            <div class="crosshair-line bottom"></div>
            <div class="crosshair-line left"></div>
            <div class="crosshair-line right"></div>
          </div>
        </div>
        <div class="hud-right">
          <div class="weapon-info">
            <span id="weaponName">手枪</span>
            <span id="ammoCount">8</span>
          </div>
          <div class="opponent-info">
            <span id="opponentName">对手</span>
            <span id="opponentHealth">💀</span>
          </div>
        </div>
      </div>
      <div class="hud-bottom">
        <div class="controls-hint">
          <span>WASD 移动</span>
          <span>鼠标 瞄准</span>
          <span>左键 射击</span>
          <span>1/2 换枪</span>
          <span>R 换弹</span>
          <span>G 手雷</span>
          <span>V 切换视角</span>
        </div>
      </div>
    </div>

    <!-- 死亡画面 -->
    <div id="deathScreen" class="death-screen hidden">
      <h2>你被击杀了!</h2>
      <p>等待复活...</p>
    </div>

    <!-- 游戏结束 -->
    <div id="gameOver" class="game-over hidden">
      <h2 id="gameOverTitle">游戏结束</h2>
      <p id="gameOverResult"></p>
      <button id="playAgainBtn" class="btn btn-primary">再来一局</button>
    </div>

    <!-- 瞄准 ADS 效果 -->
    <div id="adsOverlay" class="ads-overlay hidden"></div>
  </div>

  <!-- Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- 点击提示 -->
  <div id="clickPrompt" class="click-prompt hidden">
    <p>点击屏幕开始</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="network.js"></script>
  <script src="player.js"></script>
  <script src="game.js"></script>
</body>
</html>
